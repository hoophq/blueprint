version: 2

project_name: blueprint

before:
  hooks:
    - go mod download

builds:
  - id: blueprint
    main: .
    binary: blueprint
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/hoophq/blueprint/internal/cli.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: blueprint
    repository:
      owner: hoophq
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/hoophq/blueprint
    description: Read-only discovery of every AWS-managed database in your accounts
    license: MIT
    install: |
      bin.install "blueprint"
    test: |
      system "#{bin}/blueprint", "--version"
